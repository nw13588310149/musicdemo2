<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>百度地图打卡定位</title>

  <!--
    百度地图 JS API v3.0。需要在 https://lbsyun.baidu.com/apiconsole/key 申请一个
    "浏览器端" AK（Browser API Key），把下面 URL 中的 `__BAIDU_MAP_AK__` 替换为
    你的 AK；再在 AK 的"白名单设置"里加入当前网站域名（开发时可加 127.0.0.1、
    localhost 以及实际部署域名）。

    Flutter 端通过 iframe 调用本页面：
      `/baidu_map.html?lat=XX.XXX&lng=YY.YYY&label=教学楼A区`
    URL 中的 lat/lng 是 WGS-84（浏览器 geolocation 原始坐标），本页面会调用
    BMap.Convertor 转换为 BD-09 后再落点 + 反编码地址。
  -->
  <script type="text/javascript"
    src="https://api.map.baidu.com/api?v=3.0&ak=__BAIDU_MAP_AK__"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'PingFang SC', sans-serif;
    }
    #map {
      width: 100%;
      height: 100%;
      background: #EFF3FC;
    }
    .placeholder, .error {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #6D6B75;
      font-size: 13px;
      padding: 16px;
      text-align: center;
    }
    .error {
      color: #B6B5BB;
      background: #F5F6FA;
    }
    .error strong {
      color: #0B081A;
      font-size: 14px;
      font-weight: 500;
    }
    .anchor-label {
      max-width: 280px;
      padding: 4px 10px;
      background: #ffffff;
      color: #0B081A;
      font-size: 12px;
      line-height: 1.4;
      border-radius: 8px;
      border: 1px solid #E5E7EB;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div id="map">
    <div id="placeholder" class="placeholder">
      <strong>正在加载地图…</strong>
      <span>首次使用请允许浏览器访问位置</span>
    </div>
  </div>

  <script>
    function getQuery(name) {
      const m = new RegExp('[?&]' + name + '=([^&]+)').exec(window.location.search || '');
      return m ? decodeURIComponent(m[1]) : '';
    }

    function showError(title, detail) {
      const el = document.getElementById('map');
      el.innerHTML = '';
      const wrap = document.createElement('div');
      wrap.className = 'error';
      const t = document.createElement('strong');
      t.textContent = title;
      const d = document.createElement('span');
      d.textContent = detail || '';
      wrap.appendChild(t);
      if (detail) wrap.appendChild(d);
      el.appendChild(wrap);
    }

    window.addEventListener('load', function () {
      // 校验 AK 是否被替换。
      if (typeof BMap === 'undefined') {
        showError(
          '百度地图未就绪',
          '请确认已在 web/baidu_map.html 中配置 AK，并将当前域名加入白名单。'
        );
        return;
      }

      const latStr = getQuery('lat');
      const lngStr = getQuery('lng');
      const label = getQuery('label') || '当前位置';
      const zoom = parseInt(getQuery('zoom') || '17', 10);

      const lat = parseFloat(latStr);
      const lng = parseFloat(lngStr);
      if (!isFinite(lat) || !isFinite(lng)) {
        showError('暂无定位', '允许浏览器访问位置后会自动定位。');
        return;
      }

      // 浏览器 geolocation 给的是 WGS-84，百度地图默认 BD-09，必须先转换。
      // COORDINATES_WGS84 = 1，COORDINATES_BD09 = 5。
      const wgs = new BMap.Point(lng, lat);
      const convertor = new BMap.Convertor();
      convertor.translate([wgs], 1, 5, function (data) {
        if (!data || data.status !== 0 || !data.points || !data.points.length) {
          // 转换失败时直接用原坐标，差别在 100m 量级内。
          renderMap(wgs, label, zoom);
          return;
        }
        renderMap(data.points[0], label, zoom);
      });
    });

    function renderMap(centerBd09, label, zoom) {
      // 清掉 placeholder。
      document.getElementById('map').innerHTML = '';

      const map = new BMap.Map('map', { enableMapClick: false });
      map.centerAndZoom(centerBd09, zoom);
      map.enableScrollWheelZoom(true);
      map.addControl(new BMap.NavigationControl({ type: BMAP_NAVIGATION_CONTROL_ZOOM }));
      map.addControl(new BMap.ScaleControl());

      // 红色定位圆圈 + 中心点标。
      const accuracyCircle = new BMap.Circle(centerBd09, 30, {
        strokeColor: '#8741FF',
        strokeWeight: 1,
        strokeOpacity: 0.45,
        fillColor: '#8741FF',
        fillOpacity: 0.10,
      });
      map.addOverlay(accuracyCircle);

      const marker = new BMap.Marker(centerBd09);
      map.addOverlay(marker);
      marker.setAnimation(BMAP_ANIMATION_BOUNCE);

      // 反编码地址，并把"地址"通过 postMessage 回传给父窗口，Flutter 可以
      // 监听 `window.addEventListener('message')` 拿到精确地址。
      new BMap.Geocoder().getLocation(centerBd09, function (rs) {
        const address = rs && rs.address ? rs.address : label;
        const labelOverlay = new BMap.Label(
          '<div class="anchor-label">' + address + '</div>',
          { offset: new BMap.Size(16, -8) }
        );
        labelOverlay.setStyle({ border: 'none', background: 'transparent', padding: '0' });
        marker.setLabel(labelOverlay);
        try {
          window.parent.postMessage(
            {
              source: 'baidu_map',
              type: 'address',
              address: address,
              lng: centerBd09.lng,
              lat: centerBd09.lat,
            },
            '*'
          );
        } catch (e) { /* ignore */ }
      });
    }
  </script>
</body>
</html>
